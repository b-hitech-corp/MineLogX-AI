AWSTemplateFormatVersion: '2010-09-09'
Description: MineLogX S3 data lakes (telemetry + legislation) — parity with the Terraform s3 module.

Parameters:
  NamePrefix:
    Type: String
    Description: Resource name prefix, e.g. minelogx-dev.
  Environment:
    Type: String
  ProjectApnId:
    Type: String
    Default: 'pc:13uw3s8iyvze74tlcq3o0w8r6'

Resources:
  TelemetryDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${NamePrefix}-telemetry-data'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - { Key: aws-apn-id, Value: !Ref ProjectApnId }
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Project, Value: MineLogX-AI }

  LegislationDocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${NamePrefix}-legislation-documents'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
            BucketKeyEnabled: true
      # Emit S3 events to EventBridge — drives the event-driven PDF pipeline.
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - { Key: aws-apn-id, Value: !Ref ProjectApnId }
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Project, Value: MineLogX-AI }

Outputs:
  TelemetryDataBucket:
    Value: !Ref TelemetryDataBucket
  TelemetryDataBucketArn:
    Value: !GetAtt TelemetryDataBucket.Arn
  LegislationDocumentsBucket:
    Value: !Ref LegislationDocumentsBucket
  LegislationDocumentsBucketArn:
    Value: !GetAtt LegislationDocumentsBucket.Arn
