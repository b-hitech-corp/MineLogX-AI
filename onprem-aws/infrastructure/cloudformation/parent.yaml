AWSTemplateFormatVersion: '2010-09-09'
Description: >
  MineLogX - Parent stack that composes all nested stacks for an environment.
  Cross-layer values flow via Outputs->Parameters (no account-global Exports).
  Deploy with: uv run fab env.up <env>

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W3002  # TemplateURL is a local path; resolved by `aws cloudformation package`

Parameters:
  NamePrefix:
    Type: String
  Environment:
    Type: String
  ProjectApnId:
    Type: String
    Default: 'pc:13uw3s8iyvze74tlcq3o0w8r6'
  EnableLlmFallback:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'

  # Bring-your-own-VPC - pass when account is at the 5-VPC limit.
  # Leave empty to create a fresh VPC (default for new accounts).
  ExistingVpcId:
    Type: String
    Default: ''
  ExistingPublicSubnet1Id:
    Type: String
    Default: ''
  ExistingPublicSubnet2Id:
    Type: String
    Default: ''
  ExistingPrivateSubnet1Id:
    Type: String
    Default: ''
  ExistingPrivateSubnet2Id:
    Type: String
    Default: ''

  BuildCsvLayer:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: >
      Publish the CSV deps Lambda layer. Off by default so `package`/`deploy`
      don't fail before `fab lambda.build-layer csv` has run.
  BuildPdfLayer:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: >
      Publish the PDF deps Lambda layer. Off by default so `package`/`deploy`
      don't fail before `fab lambda.build-layer pdf` has produced the tree.
  ViteUseMock:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: >
      Passed to the Amplify app as VITE_USE_MOCK env var.
      VITE_API_BASE_URL is injected at build time by Fabric (not stored here).

Resources:
  Network:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: network/network.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId
        ExistingVpcId: !Ref ExistingVpcId
        ExistingPublicSubnet1Id: !Ref ExistingPublicSubnet1Id
        ExistingPublicSubnet2Id: !Ref ExistingPublicSubnet2Id
        ExistingPrivateSubnet1Id: !Ref ExistingPrivateSubnet1Id
        ExistingPrivateSubnet2Id: !Ref ExistingPrivateSubnet2Id

  SecurityGroups:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: security-groups/security-groups.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId
        VpcId: !GetAtt Network.Outputs.VpcId

  S3:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: s3/s3.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId

  Iam:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: iam/iam.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId
        TelemetryBucketArn: !GetAtt S3.Outputs.TelemetryDataBucketArn
        LegislationBucketArn: !GetAtt S3.Outputs.LegislationDocumentsBucketArn
        CollectionArn: !GetAtt OpenSearch.Outputs.CollectionArn
        GuardrailArn: !GetAtt Guardrails.Outputs.GuardrailArn

  Cloudwatch:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: cloudwatch/cloudwatch.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId

  Apigw:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: apigw/apigw.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId
        LambdaArn: !GetAtt Lambda.Outputs.ApiFunctionArn

  Ec2:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ec2/ec2-llm.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId
        EnableLlmFallback: !Ref EnableLlmFallback
        SubnetId: !GetAtt Network.Outputs.PrivateSubnet1Id
        SecurityGroupId: !GetAtt SecurityGroups.Outputs.SgLlmId

  OpenSearch:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: opensearch-serverless/opensearch-serverless.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId

  Guardrails:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: bedrock-guardrails/bedrock-guardrails.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId

  Amplify:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: amplify/amplify.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId
        ViteUseMock: !Ref ViteUseMock

  AmplifyDocs:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: amplify/amplify-docs.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId

  Lambda:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: lambda/lambda.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ApiRoleArn: !GetAtt Iam.Outputs.ApiRoleArn
        CsvRoleArn: !GetAtt Iam.Outputs.CsvRoleArn
        PdfRoleArn: !GetAtt Iam.Outputs.PdfRoleArn
        # Strip the scheme - the pipeline OPENSEARCH_HOST wants host only.
        OpenSearchHost: !Select [1, !Split ['https://', !GetAtt OpenSearch.Outputs.CollectionEndpoint]]
        GuardrailId: !GetAtt Guardrails.Outputs.GuardrailId
        TelemetryBucket: !GetAtt S3.Outputs.TelemetryDataBucket
        LegislationBucket: !GetAtt S3.Outputs.LegislationDocumentsBucket
        BuildPdfLayer: !Ref BuildPdfLayer
        BuildCsvLayer: !Ref BuildCsvLayer

  StepFunctions:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: step-functions/step-functions.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId
        CsvLambdaArn: !GetAtt Lambda.Outputs.CsvFunctionArn

  EventBridge:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: eventbridge/eventbridge.yaml
      Parameters:
        NamePrefix: !Ref NamePrefix
        Environment: !Ref Environment
        ProjectApnId: !Ref ProjectApnId
        StateMachineArn: !GetAtt StepFunctions.Outputs.StateMachineArn
        PdfLambdaArn: !GetAtt Lambda.Outputs.PdfFunctionArn
        PdfLambdaName: !GetAtt Lambda.Outputs.PdfFunctionName
        PdfBucketName: !GetAtt S3.Outputs.LegislationDocumentsBucket

Outputs:
  VpcId:
    Value: !GetAtt Network.Outputs.VpcId
  ApiId:
    Value: !GetAtt Apigw.Outputs.RestApiId
  ApiUrl:
    Value: !GetAtt Apigw.Outputs.ApiUrl
  AmplifyAppId:
    Value: !GetAtt Amplify.Outputs.AppId
  AmplifyDomain:
    Value: !GetAtt Amplify.Outputs.DefaultDomain
  AmplifyDocsAppId:
    Value: !GetAtt AmplifyDocs.Outputs.DocsAppId
  AmplifyDocsDomain:
    Value: !GetAtt AmplifyDocs.Outputs.DocsDomain
  OpenSearchEndpoint:
    Value: !GetAtt OpenSearch.Outputs.CollectionEndpoint
  GuardrailId:
    Value: !GetAtt Guardrails.Outputs.GuardrailId
  CsvStateMachineArn:
    Value: !GetAtt StepFunctions.Outputs.StateMachineArn
