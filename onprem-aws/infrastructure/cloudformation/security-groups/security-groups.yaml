AWSTemplateFormatVersion: '2010-09-09'
Description: MineLogX LLM security group — parity with the Terraform security_groups module.

Parameters:
  NamePrefix:
    Type: String
  Environment:
    Type: String
  ProjectApnId:
    Type: String
    Default: 'pc:13uw3s8iyvze74tlcq3o0w8r6'
  VpcId:
    Type: AWS::EC2::VPC::Id
  OllamaPort:
    Type: Number
    Default: 11434
  AppExtraPort:
    Type: Number
    Default: 8000
  AppIngressCidr:
    Type: String
    Default: 0.0.0.0/0
  SshIngressCidr:
    Type: String
    Default: 127.0.0.1/32
    Description: Operator CIDR allowed SSH. Keep tight.

Resources:
  LlmSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${NamePrefix}-sg-llm'
      GroupDescription: Security group for MineLogX LLM instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: !Ref OllamaPort, ToPort: !Ref OllamaPort, CidrIp: !Ref AppIngressCidr, Description: Ollama endpoint }
        - { IpProtocol: tcp, FromPort: !Ref AppExtraPort, ToPort: !Ref AppExtraPort, CidrIp: !Ref AppIngressCidr }
        - { IpProtocol: tcp, FromPort: 22, ToPort: 22, CidrIp: !Ref SshIngressCidr, Description: SSH }
      SecurityGroupEgress:
        - { IpProtocol: '-1', CidrIp: 0.0.0.0/0 }
      Tags:
        - { Key: Name, Value: !Sub '${NamePrefix}-sg-llm' }
        - { Key: aws-apn-id, Value: !Ref ProjectApnId }
        - { Key: Environment, Value: !Ref Environment }

Outputs:
  SgLlmId:
    Value: !Ref LlmSg
