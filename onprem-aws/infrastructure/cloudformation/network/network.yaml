AWSTemplateFormatVersion: '2010-09-09'
Description: >
  MineLogX VPC network. Creates a full VPC + subnets + NAT by default.
  Pass ExistingVpcId (+ subnet IDs) to reuse an existing VPC instead of
  creating a new one — required when the account is at the 5-VPC limit.

Parameters:
  NamePrefix:
    Type: String
  Environment:
    Type: String
  ProjectApnId:
    Type: String
    Default: 'pc:13uw3s8iyvze74tlcq3o0w8r6'

  # --- Bring-your-own-VPC (leave empty to create a new VPC) ---
  ExistingVpcId:
    Type: String
    Default: ''
    Description: >
      ID of an existing VPC to reuse. When set, all Existing*Subnet* params
      must also be provided and no new network resources are created.
  ExistingPublicSubnet1Id:
    Type: String
    Default: ''
  ExistingPublicSubnet2Id:
    Type: String
    Default: ''
  ExistingPrivateSubnet1Id:
    Type: String
    Default: ''
  ExistingPrivateSubnet2Id:
    Type: String
    Default: ''

  # --- New-VPC sizing (ignored when ExistingVpcId is set) ---
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.0.0/20
  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.16.0/20
  PrivateSubnet1Cidr:
    Type: String
    Default: 10.0.128.0/20
  PrivateSubnet2Cidr:
    Type: String
    Default: 10.0.144.0/20
  EnableNat:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'

Conditions:
  CreateVpc: !Equals [!Ref ExistingVpcId, '']
  WithNat: !And
    - !Condition CreateVpc
    - !Equals [!Ref EnableNat, 'true']

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Condition: CreateVpc
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - { Key: Name, Value: !Sub '${NamePrefix}-vpc' }
        - { Key: aws-apn-id, Value: !Ref ProjectApnId }
        - { Key: Environment, Value: !Ref Environment }

  Igw:
    Type: AWS::EC2::InternetGateway
    Condition: CreateVpc
    Properties:
      Tags:
        - { Key: Name, Value: !Sub '${NamePrefix}-igw' }
        - { Key: aws-apn-id, Value: !Ref ProjectApnId }
  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateVpc
    Properties: { VpcId: !Ref Vpc, InternetGatewayId: !Ref Igw }

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Condition: CreateVpc
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: !Sub '${NamePrefix}-public-1' }, { Key: aws-apn-id, Value: !Ref ProjectApnId }]
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Condition: CreateVpc
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: !Sub '${NamePrefix}-public-2' }, { Key: aws-apn-id, Value: !Ref ProjectApnId }]
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Condition: CreateVpc
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: [{ Key: Name, Value: !Sub '${NamePrefix}-private-1' }, { Key: aws-apn-id, Value: !Ref ProjectApnId }]
  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Condition: CreateVpc
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags: [{ Key: Name, Value: !Sub '${NamePrefix}-private-2' }, { Key: aws-apn-id, Value: !Ref ProjectApnId }]

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateVpc
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: !Sub '${NamePrefix}-rtb-public' }]
  PublicRoute:
    Type: AWS::EC2::Route
    Condition: CreateVpc
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw
  PublicAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateVpc
    Properties: { SubnetId: !Ref PublicSubnet1, RouteTableId: !Ref PublicRouteTable }
  PublicAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateVpc
    Properties: { SubnetId: !Ref PublicSubnet2, RouteTableId: !Ref PublicRouteTable }

  NatEip:
    Type: AWS::EC2::EIP
    Condition: WithNat
    Properties: { Domain: vpc, Tags: [{ Key: Name, Value: !Sub '${NamePrefix}-eip-nat' }] }
  Nat:
    Type: AWS::EC2::NatGateway
    Condition: WithNat
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags: [{ Key: Name, Value: !Sub '${NamePrefix}-nat' }]

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Condition: CreateVpc
    Properties: { VpcId: !Ref Vpc, Tags: [{ Key: Name, Value: !Sub '${NamePrefix}-rtb-private-1' }] }
  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Condition: CreateVpc
    Properties: { VpcId: !Ref Vpc, Tags: [{ Key: Name, Value: !Sub '${NamePrefix}-rtb-private-2' }] }
  PrivateRoute1:
    Type: AWS::EC2::Route
    Condition: WithNat
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref Nat
  PrivateRoute2:
    Type: AWS::EC2::Route
    Condition: WithNat
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref Nat
  PrivateAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateVpc
    Properties: { SubnetId: !Ref PrivateSubnet1, RouteTableId: !Ref PrivateRouteTable1 }
  PrivateAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateVpc
    Properties: { SubnetId: !Ref PrivateSubnet2, RouteTableId: !Ref PrivateRouteTable2 }

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateVpc
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds: [!Ref PrivateRouteTable1, !Ref PrivateRouteTable2]

Outputs:
  VpcId:
    Value: !If [CreateVpc, !Ref Vpc, !Ref ExistingVpcId]
  PrivateSubnet1Id:
    Value: !If [CreateVpc, !Ref PrivateSubnet1, !Ref ExistingPrivateSubnet1Id]
  PublicSubnetIds:
    Value: !If
      - CreateVpc
      - !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2]]
      - !Join [',', [!Ref ExistingPublicSubnet1Id, !Ref ExistingPublicSubnet2Id]]
  PrivateSubnetIds:
    Value: !If
      - CreateVpc
      - !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
      - !Join [',', [!Ref ExistingPrivateSubnet1Id, !Ref ExistingPrivateSubnet2Id]]
