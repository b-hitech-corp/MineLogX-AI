AWSTemplateFormatVersion: '2010-09-09'
Description: MineLogX - CloudWatch log groups for all Lambda functions (api, csv, pdf).

Parameters:
  NamePrefix:
    Type: String
  Environment:
    Type: String
  ProjectApnId:
    Type: String
    Default: 'pc:13uw3s8iyvze74tlcq3o0w8r6'
  RetentionInDays:
    Type: Number
    Default: 30

Resources:
  MlLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${NamePrefix}-ml'
      RetentionInDays: !Ref RetentionInDays
      Tags:
        - { Key: aws-apn-id, Value: !Ref ProjectApnId }
        - { Key: Environment, Value: !Ref Environment }
  RagLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${NamePrefix}-rag'
      RetentionInDays: !Ref RetentionInDays
      Tags:
        - { Key: aws-apn-id, Value: !Ref ProjectApnId }
        - { Key: Environment, Value: !Ref Environment }
