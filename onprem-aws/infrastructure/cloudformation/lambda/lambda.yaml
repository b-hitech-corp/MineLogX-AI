AWSTemplateFormatVersion: '2010-09-09'
Description: >
  MineLogX - Lambda functions: api (chat endpoint), csv (telemetry vectorization
  driven by Step Functions), pdf (legislation vectorization triggered by S3 events).

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W3002  # Code is a local path; resolved by `aws cloudformation package`

Parameters:
  NamePrefix:
    Type: String
  Environment:
    Type: String
  ApiRoleArn:
    Type: String
  CsvRoleArn:
    Type: String
  PdfRoleArn:
    Type: String
  OpenSearchHost:
    Type: String
    Description: AOSS collection host WITHOUT scheme (see parent Fn::Split).
  GuardrailId:
    Type: String
    Default: ''
  TelemetryBucket:
    Type: String
  LegislationBucket:
    Type: String
  BuildPdfLayer:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: >
      Publish the PDF deps layer. Off by default so `package`/`deploy` don't
      fail before `fab lambda.build-layer pdf` has produced the python/ tree.
  BuildCsvLayer:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: >
      Publish the CSV deps layer. Off by default so `package`/`deploy` don't
      fail before `fab lambda.build-layer csv` has produced the python/ tree.
  BuildApiLayer:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: >
      Publish the API deps layer (data_analysis_agent, rag_agent). Off by default
      so `package`/`deploy` don't fail before `fab lambda.build-layer api` has
      produced the python/ tree.

Conditions:
  ShouldBuildPdfLayer: !Equals [!Ref BuildPdfLayer, 'true']
  ShouldBuildCsvLayer: !Equals [!Ref BuildCsvLayer, 'true']
  ShouldBuildApiLayer: !Equals [!Ref BuildApiLayer, 'true']

Resources:
  PdfLayer:
    Type: AWS::Lambda::LayerVersion
    Condition: ShouldBuildPdfLayer
    Properties:
      LayerName: !Sub '${NamePrefix}-pdf-deps'
      CompatibleRuntimes: [python3.11]
      Content: ../../../.lambda-layers/pdf
  CsvLayer:
    Type: AWS::Lambda::LayerVersion
    Condition: ShouldBuildCsvLayer
    Properties:
      LayerName: !Sub '${NamePrefix}-csv-deps'
      CompatibleRuntimes: [python3.11]
      Content: ../../../.lambda-layers/csv
  ApiLayer:
    Type: AWS::Lambda::LayerVersion
    Condition: ShouldBuildApiLayer
    Properties:
      LayerName: !Sub '${NamePrefix}-api-deps'
      CompatibleRuntimes: [python3.11]
      Content: ../../../.lambda-layers/api
  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${NamePrefix}-api'
      Runtime: python3.11
      Handler: lambdas.api.handler.lambda_handler
      Role: !Ref ApiRoleArn
      Timeout: 900
      MemorySize: 512
      Layers: !If [ShouldBuildApiLayer, [!Ref ApiLayer], !Ref 'AWS::NoValue']
      Code: ../../../backend
      Environment:
        Variables:
          OPENSEARCH_HOST: !Ref OpenSearchHost
          GUARDRAIL_ID: !Ref GuardrailId
          FLEET_S3_BUCKET: !Ref TelemetryBucket
          FLEET_S3_PREFIX: ''
          CSV_INDEX: csv_telemetry_vecs
          ANALYSIS_INDEX: analysis_vecs
      Tags:
        - { Key: Environment, Value: !Ref Environment }

  # /analyze runs a long agentic loop (FolderPipeline) that routinely exceeds
  # HTTP API v2's non-configurable ~29-30s AWS_PROXY integration cap. A
  # Function URL bypasses that cap (Lambda timeout up to 15 min applies
  # instead) while GET routes and /chat keep using the API Gateway route.
  ApiFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref ApiFunction
      AuthType: NONE
      Cors:
        AllowOrigins: ['*']
        AllowMethods: [POST]
        AllowHeaders: [Content-Type]
        MaxAge: 300

  ApiFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  # As of Oct 2025, AWS requires BOTH lambda:InvokeFunctionUrl and
  # lambda:InvokeFunction to be granted for a NONE-auth function URL to work
  # — without this second statement, every request gets a 403
  # AccessDeniedException even though the URL and the statement above look
  # correctly configured. InvokedViaFunctionUrl scopes this grant to calls
  # made through the function URL only (not the raw Lambda Invoke API).
  ApiFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: '*'
      InvokedViaFunctionUrl: true

  CsvFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${NamePrefix}-csv'
      Runtime: python3.11
      Handler: csv_pipeline.lambda_function.lambda_handler
      Role: !Ref CsvRoleArn
      Timeout: 300
      MemorySize: 1024
      Layers: !If [ShouldBuildCsvLayer, [!Ref CsvLayer], !Ref 'AWS::NoValue']
      Code: ../../../backend
      Environment:
        Variables:
          OPENSEARCH_HOST: !Ref OpenSearchHost
          OPENSEARCH_INDEX: csv_telemetry_vecs
          FLEET_S3_BUCKET: !Ref TelemetryBucket
          FLEET_S3_PREFIX: ''
          GUARDRAIL_ID: !Ref GuardrailId
      Tags:
        - { Key: Environment, Value: !Ref Environment }

  PdfFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${NamePrefix}-pdf'
      Runtime: python3.11
      Handler: pdf_pipeline.lambda_function.lambda_handler
      Role: !Ref PdfRoleArn
      Timeout: 900
      MemorySize: 1024
      Layers: !If [ShouldBuildPdfLayer, [!Ref PdfLayer], !Ref 'AWS::NoValue']
      Code: ../../../backend
      Environment:
        Variables:
          OPENSEARCH_HOST: !Ref OpenSearchHost
          PDF_OPENSEARCH_INDEX: pdf_legal_vecs
          PDF_ARTIFACT_BUCKET: !Ref LegislationBucket
          GUARDRAIL_ID: !Ref GuardrailId
      Tags:
        - { Key: Environment, Value: !Ref Environment }

Outputs:
  ApiFunctionArn:
    Value: !GetAtt ApiFunction.Arn
  ApiFunctionUrl:
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  CsvFunctionArn:
    Value: !GetAtt CsvFunction.Arn
  PdfFunctionArn:
    Value: !GetAtt PdfFunction.Arn
  PdfFunctionName:
    Value: !Ref PdfFunction
