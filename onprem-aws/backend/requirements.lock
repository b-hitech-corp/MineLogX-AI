# opentelemetry-*, pydantic-settings, PyJWT, python-multipart, sse-starlette,
# watchdog, wrapt) were added later, resolved in an isolated Python 3.11 venv —
# not re-frozen against the full SageMaker snapshot above. Packages already
# pinned above (anyio, httpx, pydantic, etc.) were left untouched since they
# satisfied strands-agents' requirements in that resolution; re-verify on the
# next full environment rebuild.

