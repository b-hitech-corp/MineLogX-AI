# Snapshot of the SageMaker environment where both pipelines were verified
# end-to-end. This is the FULL resolved set (direct + transitive + platform),
# for byte-for-byte reproduction. For day-to-day installs use requirements.txt
# (the curated direct dependencies); pip resolves the rest from there.
#
# Repaired from `pip freeze`: ~20 packages were pinned to conda `file:///home/conda`
# local paths that exist only on the source notebook and break `pip install`
# elsewhere. Those are listed unpinned at the bottom (Jupyter/IPython platform
# packages; exact versions are not recoverable from the freeze paths). ptyprocess
# kept its wheel-embedded version (0.7.0).
#
