# One-time setup:  uvx pre-commit install
# Update pins:     uvx pre-commit autoupdate
# Run manually:    uvx pre-commit run --all-files
#
# Prerequisites for some hooks: terraform (fmt/validate), and for the frontend
# hook: node + pnpm with deps installed under frontend/.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key   # blocks committing keys (.pem, etc.)

  # --- Python: lint + format (ruff) and security (bandit) ---
  # onprem-aws/demo/ is the client's DEPLOYED demo code, pulled verbatim as a
  # reference base (fab lambda.pull). We do not lint/reformat it — it must stay
  # faithful to what is live in AWS.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^onprem-aws/demo/|\.ipynb$
      - id: ruff-format
        exclude: ^onprem-aws/demo/|\.ipynb$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit   # runs only on staged .py; .venv never reaches here
        exclude: ^onprem-aws/demo/|\.ipynb$
        args: ["-f", "json", "-ll"]  # json=ASCII-safe (avoids cp1252 crash); -ll=MEDIUM+ only (skips B101 assert-in-tests and B110 try/except/pass, all LOW)

  # --- YAML ---
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  # Terraform fmt/validate are intentionally NOT pre-commit hooks: they require a
  # terraform binary on PATH (fragile on Windows/Git Bash) and `validate` needs
  # `terraform init` + backend credentials, which don't belong in a commit hook.
  # Run them in CI and/or manually:  terraform fmt -recursive  /  terraform validate

  # --- CloudFormation: cfn-lint ---
  - repo: https://github.com/aws-cloudformation/cfn-lint
    rev: v1.52.1
    hooks:
      - id: cfn-lint
        files: .*/infrastructure/cloudformation/.*\.(ya?ml|json)$
        exclude: .*/cloudformation/params/.*   # parameter files, not templates

  # --- TS/JS/React: eslint + tsc (only when frontend files are staged) ---
  - repo: local
    hooks:
      - id: frontend-eslint
        name: eslint + tsc (frontend)
        language: system
        pass_filenames: false
        files: ^shared/frontend/.*\.(ts|tsx|js|jsx)$
        entry: bash -c 'command -v pnpm >/dev/null 2>&1 || { echo "pnpm not found — skipping frontend lint"; exit 0; }; cd shared/frontend && pnpm lint && pnpm exec tsc --noEmit'
