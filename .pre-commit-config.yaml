# One-time setup:  uvx pre-commit install
# Update pins:     uvx pre-commit autoupdate
# Run manually:    uvx pre-commit run --all-files
#
# Prerequisites for some hooks: terraform (fmt/validate), and for the frontend
# hook: node + pnpm with deps installed under frontend/.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key   # blocks committing keys (.pem, etc.)

  # --- Python: lint + format (ruff) and security (bandit) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit   # runs only on staged .py; .venv never reaches here

  # --- YAML ---
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  # --- Terraform: format + validate ---
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.108.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate

  # --- CloudFormation: cfn-lint ---
  - repo: https://github.com/aws-cloudformation/cfn-lint
    rev: v1.52.1
    hooks:
      - id: cfn-lint
        files: .*/infrastructure/cloudformation/.*\.(ya?ml|json)$

  # --- TS/JS/React: eslint + tsc (only when frontend files are staged) ---
  - repo: local
    hooks:
      - id: frontend-eslint
        name: eslint + tsc (frontend)
        language: system
        pass_filenames: false
        files: ^shared/frontend/.*\.(ts|tsx|js|jsx)$
        entry: bash -c 'cd shared/frontend && pnpm lint && pnpm exec tsc --noEmit'
